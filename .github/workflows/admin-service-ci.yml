name: Admin Service CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/admin-service-ci.yml'
      - 'services/common/**'
      - 'services/admin-service/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/admin-service-ci.yml'
      - 'services/common/**'
      - 'services/admin-service/**'

jobs:
  run:
    uses: ./.github/workflows/service-workflow.yml
    with:
      service: admin-service