name: Backend Continuous Integration

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'infra/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'infra/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Backend Test
        run: mvn clean test
        working-directory: services

      - name: PR Coverage Comment (common)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/common/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

      - name: PR Coverage Comment (prayer-service)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/prayer-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

      - name: PR Coverage Comment (group-service)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/group-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

      - name: PR Coverage Comment (notification-service)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/notification-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

      - name: PR Coverage Comment (identity-service)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/identity-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

      - name: PR Coverage Comment (admin-service)
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/admin-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8
