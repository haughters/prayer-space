name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Generate version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${BASE}.${{ github.run_number }}"
          npm version $VERSION --no-git-tag-version
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Frontend version: $VERSION"
        working-directory: frontend

      - name: Build
        run: |
          npm ci
          npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
        working-directory: frontend

      - name: Deploy to S3
        run: |
          FRONTEND_BUCKET=$(aws cloudformation list-exports --query "Exports[?Name=='test-PrayerLinkFrontendBucketName'].Value" --output text)
          CLOUDFRONT_ID=$(aws cloudformation list-exports --query "Exports[?Name=='test-PrayerLinkCloudFrontDistributionId'].Value" --output text)
          
          if [ -z "$FRONTEND_BUCKET" ] || [ -z "$CLOUDFRONT_ID" ]; then
            echo "Error: Could not resolve Frontend Bucket or CloudFront ID from CloudFormation exports."
            exit 1
          fi

          aws s3 sync dist/ s3://${FRONTEND_BUCKET} \
            --delete \
            --metadata version=${{ steps.version.outputs.version }}

          aws cloudfront create-invalidation \
            --distribution-id ${CLOUDFRONT_ID} \
            --paths "/*"
        working-directory: frontend

      - name: Smoke Test
        run: |
          sleep 10  # wait for CDN propagation
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://prayer-link.com)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend smoke test failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Frontend responding (HTTP $STATUS) — version ${{ steps.version.outputs.version }}"
