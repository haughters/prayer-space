name: Group Service CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/group-service-ci.yml'
      - 'services/common/**'
      - 'services/group-service/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/group-service-ci.yml'
      - 'services/common/**'
      - 'services/group-service/**'

jobs:
  run:
    uses: ./.github/workflows/service-workflow.yml
    with:
      service: group-service