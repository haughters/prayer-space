name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - live

concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && format('pr-{0}-infra', github.event.pull_request.number) || inputs.environment || 'test-infra' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install CDK dependencies
        run: |
          npm ci
          npm run build
        working-directory: infra/cdk

      - name: Deploy Test Infrastructure
        if: github.event_name != 'workflow_dispatch' || inputs.environment == 'test'
        run: |
          npx cdk deploy --all \
            --require-approval never \
            -c deployEnv=test \
            -c gitSha=${{ github.sha }}
        working-directory: infra/cdk

      - name: Deploy Live Infrastructure
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'live')
        run: |
          npx cdk deploy --all \
            --require-approval never \
            -c deployEnv=live \
            -c gitSha=${{ github.sha }}
        working-directory: infra/cdk
