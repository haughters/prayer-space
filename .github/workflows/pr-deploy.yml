name: PR Environment

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'services/**'

concurrency:
  group: pr-environment           # only 1 PR deploys at a time — others queue
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            prayer-service:
              - 'services/prayer-service/**'
              - 'services/common/**'
            group-service:
              - 'services/group-service/**'
              - 'services/common/**'
            notification-service:
              - 'services/notification-service/**'
              - 'services/common/**'
            identity-service:
              - 'services/identity-service/**'
              - 'services/common/**'
            admin-service:
              - 'services/admin-service/**'
              - 'services/common/**'

  build-and-deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up GraalVM
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-pr-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-pr-
            ${{ runner.os }}-m2-

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Build Changed Services
        run: |
          CHANGED='${{ needs.detect-changes.outputs.services }}'
          for svc in prayer-service group-service notification-service identity-service admin-service; do
            if echo "$CHANGED" | grep -q "$svc"; then
              echo "::group::Building $svc"
              mvn package -P lambda -pl :$svc -am -DskipTests --batch-mode
              echo "::endgroup::"
            fi
          done
        working-directory: services

      - name: Deploy PR Lambdas
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          CHANGED='${{ needs.detect-changes.outputs.services }}'
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          URLS=""

          for svc in prayer-service group-service notification-service identity-service admin-service; do
            if echo "$CHANGED" | grep -q "$svc"; then
              FUNC_NAME="pr-${PR_NUM}-${svc}"
              ZIP_PATH="services/${svc}/target/${svc}-lambda.zip"
              ZIP_KEY="pr-deploys/${FUNC_NAME}/${SHORT_SHA}.zip"

              # Upload zip to S3
              aws s3 cp "$ZIP_PATH" "s3://${{ secrets.DEPLOY_BUCKET }}/$ZIP_KEY"

              # Create or update Lambda
              if aws lambda get-function --function-name "$FUNC_NAME" 2>/dev/null; then
                aws lambda update-function-code \
                  --function-name "$FUNC_NAME" \
                  --s3-bucket "${{ secrets.DEPLOY_BUCKET }}" \
                  --s3-key "$ZIP_KEY"
              else
                aws lambda create-function \
                  --function-name "$FUNC_NAME" \
                  --runtime provided.al2023 \
                  --handler bootstrap \
                  --role "${{ secrets.LAMBDA_EXECUTION_ROLE }}" \
                  --code S3Bucket=${{ secrets.DEPLOY_BUCKET }},S3Key=$ZIP_KEY \
                  --memory-size 512 \
                  --timeout 30 \
                  --environment "Variables={SPRING_PROFILES_ACTIVE=default,DEPLOY_ENV=test,APP_TABLE_PREFIX=test-,PR_NUMBER=${PR_NUM}}"

                # Add Function URL
                aws lambda add-permission \
                  --function-name "$FUNC_NAME" \
                  --statement-id FunctionURLAllowPublicAccess \
                  --action lambda:InvokeFunctionUrl \
                  --principal '*' \
                  --function-url-auth-type NONE

                aws lambda create-function-url-config \
                  --function-name "$FUNC_NAME" \
                  --auth-type NONE
              fi

              # Wait for update to complete
              aws lambda wait function-updated --function-name "$FUNC_NAME"

              # Get the Function URL
              URL=$(aws lambda get-function-url-config --function-name "$FUNC_NAME" \
                --query 'FunctionUrl' --output text)
              URLS="${URLS}\n- **${svc}**: ${URL}"
            fi
          done

          echo "PR_URLS<<EOF" >> $GITHUB_ENV
          echo -e "$URLS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Configure PR Lambda Environment
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          CHANGED='${{ needs.detect-changes.outputs.services }}'

          # Resolve active URL for each service (PR URL if changed, Test URL if unchanged)
          for svc in identity-service prayer-service group-service admin-service; do
            if echo "$CHANGED" | grep -q "$svc"; then
              URL=$(aws lambda get-function-url-config --function-name "pr-${PR_NUM}-${svc}" --query 'FunctionUrl' --output text)
            else
              URL=$(aws lambda get-function-url-config --function-name "test-${svc}" --query 'FunctionUrl' --output text 2>/dev/null || echo "")
            fi
            VAR_NAME="URL_$(echo "$svc" | tr '-' '_' | tr '[:lower:]' '[:upper:]')"
            eval "$VAR_NAME=\"$URL\""
          done

          # Update each changed service's environment configuration
          for svc in prayer-service group-service notification-service identity-service admin-service; do
            if echo "$CHANGED" | grep -q "$svc"; then
              FUNC_NAME="pr-${PR_NUM}-${svc}"

              ENV_VARS="SPRING_PROFILES_ACTIVE=default"
              ENV_VARS="${ENV_VARS},DEPLOY_ENV=test"
              ENV_VARS="${ENV_VARS},APP_TABLE_PREFIX=test-"
              ENV_VARS="${ENV_VARS},PR_NUMBER=${PR_NUM}"

              # Append service-specific env vars to prevent wiping existing configs
              if [ "$svc" = "prayer-service" ]; then
                ENV_VARS="${ENV_VARS},AWS_EVENTBRIDGE_BUS_NAME=test-prayer-link-bus"
                ENV_VARS="${ENV_VARS},SERVICES_GROUP_SERVICE_URL=${URL_GROUP_SERVICE}"
              elif [ "$svc" = "identity-service" ]; then
                ENV_VARS="${ENV_VARS},SERVICES_GROUP_SERVICE_URL=${URL_GROUP_SERVICE}"
              elif [ "$svc" = "admin-service" ]; then
                ENV_VARS="${ENV_VARS},SERVICES_GROUP_SERVICE_URL=${URL_GROUP_SERVICE}"
                ENV_VARS="${ENV_VARS},SERVICES_PRAYER_SERVICE_URL=${URL_PRAYER_SERVICE}"
              elif [ "$svc" = "notification-service" ]; then
                ENV_VARS="${ENV_VARS},AWS_SQS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/${{ secrets.AWS_ACCOUNT_ID }}/test-notification-queue"
                ENV_VARS="${ENV_VARS},AWS_SQS_BOUNCE_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/${{ secrets.AWS_ACCOUNT_ID }}/test-bounce-queue"
                ENV_VARS="${ENV_VARS},AWS_SQS_NOTIFICATION_QUEUE=test-notification-queue"
                ENV_VARS="${ENV_VARS},AWS_SQS_BOUNCE_QUEUE=test-bounce-queue"
                ENV_VARS="${ENV_VARS},SERVICES_GROUP_SERVICE_URL=${URL_GROUP_SERVICE}"
                ENV_VARS="${ENV_VARS},SERVICES_PRAYER_SERVICE_URL=${URL_PRAYER_SERVICE}"
              fi

              aws lambda update-function-configuration \
                --function-name "$FUNC_NAME" \
                --environment "Variables={${ENV_VARS}}"
            fi
          done

      - name: Smoke Test PR
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          CHANGED='${{ needs.detect-changes.outputs.services }}'

          for svc in prayer-service group-service identity-service admin-service; do
            if echo "$CHANGED" | grep -q "$svc"; then
              URL=$(aws lambda get-function-url-config \
                --function-name "pr-${PR_NUM}-${svc}" \
                --query 'FunctionUrl' --output text)
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --max-time 30 "${URL}actuator/health")
              echo "$svc → $STATUS ($URL)"
            fi
          done

      - name: Comment PR with URLs
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🚀 PR Environment Deployed

            **Commit**: `${{ github.sha }}`

            **Service URLs:**
            ${{ env.PR_URLS }}

            > These Lambdas share the **test** DynamoDB tables (`test-*` prefix). Unchanged services are served by the test environment.
