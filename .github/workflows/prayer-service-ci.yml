name: Prayer Service CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/prayer-service-ci.yml'
      - '.github/workflows/service-workflow.yml'
      - 'services/common/**'
      - 'services/prayer-service/**'
  pull_request:
    types:
      - opened
      - synchronize
    branches: [ main ]
    paths:
      - '.github/workflows/prayer-service-ci.yml'
      - '.github/workflows/service-workflow.yml'
      - 'services/common/**'
      - 'services/prayer-service/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  packages: write

jobs:
  run:
    uses: ./.github/workflows/service-workflow.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      packages: write

    secrets: inherit

    with:
      service: prayer-service