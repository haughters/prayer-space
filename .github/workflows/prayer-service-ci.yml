name: Prayer Service CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/prayer-service-ci.yml'
      - '.github/workflows/service-workflow.yml'
      - 'services/common/**'
      - 'services/prayer-service/**'
  pull_request:
    types:
      - opened
      - synchronize
    branches: [ main ]
    paths:
      - '.github/workflows/prayer-service-ci.yml'
      - '.github/workflows/service-workflow.yml'
      - 'services/common/**'
      - 'services/prayer-service/**'

permissions:
  contents: read
  code-quality: write
  pull-requests: write
  packages: write

jobs:
  run:
    uses: ./.github/workflows/service-workflow.yml
    secrets: inherit

    with:
      service: prayer-service