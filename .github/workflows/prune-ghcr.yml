name: Prune GHCR Images

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  prune-pr-images:
    name: Prune PR Images
    runs-on: ubuntu-latest
    steps:
      - name: Prune old PR images (older than 7 days)
        uses: snok/container-retention-policy@v3.0.0
        with:
          account-type: personal 
          image-names: admin-service, group-service, identity-service, notification-service, prayer-service
          cut-off: 7d
          keep-at-least: 1
          filter-tags: pr-*
          token: ${{ secrets.GITHUB_TOKEN }}

  prune-main-images:
    name: Prune Main Branch Images
    runs-on: ubuntu-latest
    steps:
      - name: Prune old main images (older than 30 days)
        uses: snok/container-retention-policy@v3.0.0
        with:
          account-type: personal 
          image-names: admin-service, group-service, identity-service, notification-service, prayer-service
          cut-off: 30d
          keep-at-least: 2
          filter-tags: '^[a-f0-9]{7}$' 
          token: ${{ secrets.GITHUB_TOKEN }}
