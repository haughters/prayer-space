on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ inputs.service }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ inputs.service }}-
            ${{ runner.os }}-m2-

      - name: Backend Test
        run: mvn clean test --projects :${{ inputs.service }} --also-make --batch-mode
        working-directory: services

      - name: PR Coverage Comment (${{ inputs.service }})
        uses: madrapps/jacoco-report@v1.8.0
        if: github.event_name == 'pull_request'
        with:
          paths: services/${{ inputs.service }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-lines: 90
          title: Coverage Report (${{ inputs.service }})
          update-comment: true
