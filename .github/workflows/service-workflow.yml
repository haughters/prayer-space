name: Common Service Workflow
on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      has-url:
        required: false
        type: boolean
        default: true
      smoke-test-path:
        required: false
        type: string
      smoke-test-method:
        required: false
        type: string
        default: 'GET'
      smoke-test-expected-status:
        required: false
        type: string
        default: '200'
      smoke-test-body:
        required: false
        type: string
        default: ''

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: amazonlinux:2023
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - name: Install dependencies
        run: dnf install -y tar gzip git gcc findutils maven zlib-devel make

      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ inputs.service }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ inputs.service }}-
            ${{ runner.os }}-m2-

      - name: Backend Test & Install
        run: mvn clean install --projects :${{ inputs.service }} --also-make --batch-mode
        working-directory: services

      - name: PR Coverage Comment (${{ inputs.service }})
        uses: madrapps/jacoco-report@v1.8.0
        if: github.event_name == 'pull_request'
        with:
          paths: services/${{ inputs.service }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-lines: 90
          title: Coverage Report (${{ inputs.service }})
          update-comment: true

      - name: Build Native Lambda Zip
        run: |
          # Build the native executable
          mvn package -P lambda -pl :${{ inputs.service }} -DskipTests -Dspring.profiles.active=default --batch-mode
        working-directory: services

      - name: Upload Lambda Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service }}-lambda-zip
          path: services/${{ inputs.service }}/target/${{ inputs.service }}-lambda.zip
          retention-days: 7

  deploy-test:
    needs: build-and-test
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    environment:
      name: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.pull_request.number, inputs.service) || format('test-{0}', inputs.service) }}
      url: ${{ env.SERVICE_URL }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download Lambda Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.service }}-lambda-zip
          path: artifact-dir

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Resolve Environment
        run: |
          SVC="${{ inputs.service }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ENV_PREFIX="pr-${{ github.event.pull_request.number }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            ENV_PREFIX="test"
            PR_NUMBER=""
          fi
          FUNC_NAME="${ENV_PREFIX}-${SVC}"

          echo "SVC=$SVC" >> $GITHUB_ENV
          echo "ENV_PREFIX=$ENV_PREFIX" >> $GITHUB_ENV
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "FUNC_NAME=$FUNC_NAME" >> $GITHUB_ENV
          echo "DEPLOY_ENV=test" >> $GITHUB_ENV

      - name: Deploy Code and Configuration
        env:
          HAS_URL: ${{ inputs.has-url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/deploy-lambda.sh

      - name: Publish Version
        if: env.PR_NUMBER == ''
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "$FUNC_NAME" \
            --description "sha:${GITHUB_SHA::8} run:${GITHUB_RUN_NUMBER}" \
            --query 'Version' --output text)
          echo "Published version $VERSION for $FUNC_NAME"
          echo "PUBLISHED_VERSION=$VERSION" >> $GITHUB_ENV
          
          PREV_VERSION=$(aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name stable \
            --query 'FunctionVersion' --output text 2>/dev/null || echo "")
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV

      - name: Smoke Test Version
        if: env.PR_NUMBER == '' && inputs.has-url
        env:
          SMOKE_TEST_PATH: ${{ inputs.smoke-test-path }}
          SMOKE_TEST_METHOD: ${{ inputs.smoke-test-method }}
          SMOKE_TEST_EXPECTED_STATUS: ${{ inputs.smoke-test-expected-status }}
          SMOKE_TEST_BODY: ${{ inputs.smoke-test-body }}
        run: bash .github/scripts/smoke-test-version.sh

      - name: Update Alias
        if: env.PR_NUMBER == ''
        run: |
          aws lambda update-alias \
            --function-name "$FUNC_NAME" \
            --name stable \
            --function-version "$PUBLISHED_VERSION"
          echo "Alias 'stable' updated to $PUBLISHED_VERSION"

      - name: Resolve Service URL
        if: inputs.has-url
        run: |
          if [ -n "$PR_NUMBER" ]; then
            FINAL_URL=$(aws lambda get-function-url-config --function-name "$FUNC_NAME" --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          else
            FINAL_URL=$(aws lambda get-function-url-config --function-name "$FUNC_NAME" --qualifier stable --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          fi
          echo "SERVICE_URL=$FINAL_URL" >> $GITHUB_ENV

      - name: Smoke Test URL
        if: inputs.has-url
        env:
          SMOKE_TEST_PATH: ${{ inputs.smoke-test-path }}
          SMOKE_TEST_METHOD: ${{ inputs.smoke-test-method }}
          SMOKE_TEST_EXPECTED_STATUS: ${{ inputs.smoke-test-expected-status }}
          SMOKE_TEST_BODY: ${{ inputs.smoke-test-body }}
        run: bash .github/scripts/smoke-test-url.sh

  deploy-live:
    needs: deploy-test
    if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment:
      name: ${{ format('live-{0}', inputs.service) }}
      url: ${{ env.SERVICE_URL }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download Lambda Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.service }}-lambda-zip
          path: artifact-dir

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Resolve Environment
        run: |
          SVC="${{ inputs.service }}"
          ENV_PREFIX="live"
          FUNC_NAME="${ENV_PREFIX}-${SVC}"

          echo "SVC=$SVC" >> $GITHUB_ENV
          echo "ENV_PREFIX=$ENV_PREFIX" >> $GITHUB_ENV
          echo "PR_NUMBER=" >> $GITHUB_ENV
          echo "FUNC_NAME=$FUNC_NAME" >> $GITHUB_ENV
          echo "DEPLOY_ENV=live" >> $GITHUB_ENV

      - name: Deploy Code and Configuration
        env:
          HAS_URL: ${{ inputs.has-url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/deploy-lambda.sh

      - name: Publish Version
        if: env.PR_NUMBER == ''
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "$FUNC_NAME" \
            --description "sha:${GITHUB_SHA::8} run:${GITHUB_RUN_NUMBER}" \
            --query 'Version' --output text)
          echo "Published version $VERSION for $FUNC_NAME"
          echo "PUBLISHED_VERSION=$VERSION" >> $GITHUB_ENV
          
          PREV_VERSION=$(aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name stable \
            --query 'FunctionVersion' --output text 2>/dev/null || echo "")
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV

      - name: Smoke Test Version
        if: env.PR_NUMBER == '' && inputs.has-url
        env:
          SMOKE_TEST_PATH: ${{ inputs.smoke-test-path }}
          SMOKE_TEST_METHOD: ${{ inputs.smoke-test-method }}
          SMOKE_TEST_EXPECTED_STATUS: ${{ inputs.smoke-test-expected-status }}
          SMOKE_TEST_BODY: ${{ inputs.smoke-test-body }}
        run: bash .github/scripts/smoke-test-version.sh

      - name: Update Alias
        if: env.PR_NUMBER == ''
        run: |
          aws lambda update-alias \
            --function-name "$FUNC_NAME" \
            --name stable \
            --function-version "$PUBLISHED_VERSION"
          echo "Alias 'stable' updated to $PUBLISHED_VERSION"

      - name: Resolve Service URL
        if: inputs.has-url
        run: |
          if [ -n "$PR_NUMBER" ]; then
            FINAL_URL=$(aws lambda get-function-url-config --function-name "$FUNC_NAME" --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          else
            FINAL_URL=$(aws lambda get-function-url-config --function-name "$FUNC_NAME" --qualifier stable --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          fi
          echo "SERVICE_URL=$FINAL_URL" >> $GITHUB_ENV

      - name: Smoke Test URL
        if: inputs.has-url
        env:
          SMOKE_TEST_PATH: ${{ inputs.smoke-test-path }}
          SMOKE_TEST_METHOD: ${{ inputs.smoke-test-method }}
          SMOKE_TEST_EXPECTED_STATUS: ${{ inputs.smoke-test-expected-status }}
          SMOKE_TEST_BODY: ${{ inputs.smoke-test-body }}
        run: bash .github/scripts/smoke-test-url.sh
