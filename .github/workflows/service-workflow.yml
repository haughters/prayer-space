on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Backend Test
        run: mvn clean test --projects :${{ inputs.service }} --also-make --batch-mode
        working-directory: services

      - name: PR Coverage Comment (${{ inputs.service }})
        uses: orgoro/coverage@v3.2
        if: github.event_name == 'pull_request'
        with:
          coverageFile: services/${{ inputs.service }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8
