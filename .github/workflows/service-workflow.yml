on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ inputs.service }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ inputs.service }}-
            ${{ runner.os }}-m2-

      - name: Backend Test & Install
        run: mvn clean install --projects :${{ inputs.service }} --also-make --batch-mode
        working-directory: services

      - name: PR Coverage Comment (${{ inputs.service }})
        uses: madrapps/jacoco-report@v1.8.0
        if: github.event_name == 'pull_request'
        with:
          paths: services/${{ inputs.service }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-lines: 90
          title: Coverage Report (${{ inputs.service }})
          update-comment: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push GraalVM Docker Images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-$SHORT_SHA"
          else
            TAG="$SHORT_SHA"
          fi
          
          IMAGE_NAME="ghcr.io/$OWNER/${{ inputs.service }}:$TAG"
          CACHE_NAME="ghcr.io/$OWNER/${{ inputs.service }}-cache:latest"
          
          mvn spring-boot:build-image \
            -pl ${{ inputs.service }} \
            -Dspring-boot.build-image.imageName=$IMAGE_NAME \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.environmentVariables.BP_NATIVE_IMAGE=true \
            -Dspring-boot.build-image.buildCache.image.name=$CACHE_NAME \
            --batch-mode
        working-directory: services
