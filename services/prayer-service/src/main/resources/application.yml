server:
  port: 8082

spring:
  application:
    name: prayer-service
  profiles:
    active: local

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
---
spring:
  config:
    activate:
      on-profile: local

aws:
  dynamodb:
    endpoint: http://localhost:8000
    region: eu-west-1
  eventbridge:
    endpoint: http://localhost:4566
    region: eu-west-1
    bus: prayer-link-bus

